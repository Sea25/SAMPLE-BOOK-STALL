<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper & Oak | book stall</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="stall-header">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <div class="stall-name">paper & oak <small>book stall</small></div>
    </div>
    <div class="cart-toggle" id="cart-summary-btn">
        <i class="fas fa-basket-shopping"></i>
        <span>your basket</span>
        <span id="cart-count">0</span>
    </div>
</header>

<div class="stall-banner">
    <div class="banner-text">
        <h2><strong>handpicked reads</strong> for quiet afternoons</h2>
        <p><i class="fas fa-map-pin" style="color:#b46f4c;"></i> college street • open till dusk</p>
    </div>
    <div class="banner-emoji">
        <i class="fas fa-mug-saucer"></i>
    </div>
</div>

<!-- main shop area -->
<div class="container">
    <!-- left side: book grid -->
    <div class="books-grid" id="booksGrid"></div>

    <!-- right side: cart (sticky) -->
    <div class="cart-section" id="cartSection">
        <div class="cart-header">
            <i class="fas fa-basket-shopping"></i>
            <h2>your stall basket</h2>
        </div>
        <div class="cart-items" id="cartItemsContainer">
            <!-- dynamically populated -->
            <div class="empty-cart-msg">your basket is gathering dust... 📖</div>
        </div>
        <div class="cart-total">
            <span>total</span>
            <span id="cartTotalAmount">0</span>
        </div>
        <button class="checkout-btn" id="checkoutBtn">
            <i class="fas fa-bag-shopping"></i> check out · imaginary
        </button>
    </div>
</div>

<footer class="stall-footer">
    <p>🍂 paper & oak book stall · all stories are free (demo only)</p>
</footer>

<!-- External JavaScript -->
<script src="script.js"></script>
</body>
</html>
